services:
  postgres:
    image: postgres:16
    container_name: weaves_task_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Bogota
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - task_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: weaves_task_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT}:8080"
    networks:
      - task_net
    depends_on:
      - postgres

  task-api:
    build:
      context: ./task-api
      dockerfile: Dockerfile
    container_name: weaves_task_api
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      API_PORT: ${API_PORT:-8000}
    ports:
      - "${API_PORT:-8001}:8000"
    networks:
      - task_net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  task-frontend:
    build:
      context: ./task-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://192.168.0.22:8001
    container_name: weaves_task_frontend
    restart: unless-stopped
    ports:
      - "3002:4173"
    networks:
      - task_net
    depends_on:
      - task-api

volumes:
  postgres_data:

networks:
  task_net:
    driver: bridge
